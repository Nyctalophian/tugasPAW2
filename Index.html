<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Form Laporan Barang Temuan</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ══ TOP BAR ══ -->
<header class="topbar">
  <div class="topbar-menu">
    <span></span><span></span><span></span>
  </div>
  <span class="topbar-title">Daftar Barang Temuan</span>
  <span class="topbar-icon">
    <!-- Ganti dengan aset lonceng: <img src="lonceng.png" width="24" height="24" alt="Notifikasi"> -->
    <svg width="24" height="24" fill="none" viewBox="0 0 24 24"
         stroke="#FAFCF8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
      <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
    </svg>
  </span>
</header>

<!-- ══ PAGE WRAPPER ══ -->
<div class="page-wrapper">
  <div class="card">

    <!-- CARD HEADER -->
    <div class="card-header">
      <h2>Form Laporan Barang Temuan</h2>
      <p>Isi informasi barang yang Anda temukan, lalu klik Ajukan Klaim</p>
    </div>

    <!-- ══ FORM — kirim ke upload.php ══ -->
    <!--
      enctype="multipart/form-data" WAJIB ada agar file bisa dikirim ke PHP.
      Semua validasi (ekstensi, ukuran, jumlah) dilakukan di upload.php.
    -->
    <form action="upload.php" method="POST" enctype="multipart/form-data">
      <div class="form-body">

        <!-- Nama Barang -->
        <div class="field">
          <label for="nama_barang">Nama Barang <span class="req">*</span></label>
          <input type="text"
                 id="nama_barang"
                 name="nama_barang"
                 placeholder="Contoh: Dompet Kulit"
                 required />
        </div>

        <!-- Nomor Telepon -->
        <div class="field">
          <label for="nomor_telepon">Nomor Telepon <span class="req">*</span></label>
          <input type="tel"
                 id="nomor_telepon"
                 name="nomor_telepon"
                 placeholder="Contoh: 08265217621"
                 required />
        </div>

        <!-- Email -->
        <div class="field">
          <label for="email">Email <span class="req">*</span></label>
          <input type="email"
                 id="email"
                 name="email"
                 placeholder="Contoh: nama@email.com"
                 required />
        </div>

        <!-- Kategori -->
        <div class="field">
          <label for="kategori">Kategori Barang <span class="req">*</span></label>
          <div class="select-wrap">
            <select id="kategori" name="kategori" required>
              <option value="" disabled selected>Pilih kategori...</option>
              <option value="elektronik">Elektronik</option>
              <option value="dompet_tas">Dompet / Tas</option>
              <option value="dokumen">Dokumen / Kartu</option>
              <option value="aksesoris">Aksesoris / Perhiasan</option>
              <option value="pakaian">Pakaian</option>
              <option value="kendaraan">Kunci / Kendaraan</option>
              <option value="lainnya">Lainnya</option>
            </select>
          </div>
        </div>

        <!-- Bukti Kepemilikan -->
        <div class="field full">
          <label for="bukti_kepemilikan">Bukti Kepemilikan <span class="req">*</span></label>
          <textarea id="bukti_kepemilikan"
                    name="bukti_kepemilikan"
                    placeholder="Jelaskan bagaimana Anda bisa membuktikan kepemilikan barang ini..."
                    required></textarea>
        </div>

        <!-- Ciri-ciri Khusus -->
        <div class="field full">
          <label for="ciri_khusus">Ciri-ciri Khusus</label>
          <input type="text"
                 id="ciri_khusus"
                 name="ciri_khusus"
                 placeholder="Sebutkan ciri-ciri khusus dari barang" />
        </div>

        <!-- Upload Foto -->
        <!--
          accept=".jpg,.jpeg,.png" membatasi dialog file browser hanya tampilkan jpg/png.
          Validasi sesungguhnya tetap dilakukan di PHP (tidak bisa hanya andalkan HTML).
          multiple membolehkan pilih banyak file sekaligus.
          name="foto_barang[]" — tanda [] penting agar PHP terima sebagai array.
        -->
        <div class="field full">
          <label for="foto_barang">Foto Barang</label>
          <p class="field-hint">
            Pilih foto dari PC/laptop Anda. Hanya <strong>.jpg</strong> dan <strong>.png</strong>
            yang diterima — Maksimal <strong>5 foto</strong>, masing-masing maks 5 MB.<br>
            Preview foto akan ditampilkan setelah Anda klik <em>Ajukan Klaim</em>.
          </p>
          <input type="file"
                 id="foto_barang"
                 name="foto_barang[]"
                 accept=".jpg,.jpeg,.png"
                 multiple />
        </div>

      </div><!-- end .form-body -->

      <!-- FORM FOOTER -->
      <div class="form-footer">
        <button type="submit" class="btn-submit">
          Ajukan Klaim
          <svg width="16" height="16" fill="none" viewBox="0 0 16 16">
            <path d="M2 8h10m-4-4l4 4-4 4" stroke="#FAFCF8"
                  stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <!-- Reset form native HTML — tanpa JS -->
        <button type="reset" class="btn-secondary">Batal</button>
      </div>

    </form>
  </div>
</div>

</body>
</html>
